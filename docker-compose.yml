services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: toolshare
      POSTGRES_PASSWORD: toolshare
      POSTGRES_DB: toolshare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolshare -d toolshare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
